<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DramaVocab">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<title>Drama Vocab</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #55556a;
  --accent: #7c6dfa;
  --accent-dim: rgba(124,109,250,0.15);
  --accent-glow: rgba(124,109,250,0.3);
  --green: #3dd68c;
  --green-dim: rgba(61,214,140,0.12);
  --red: #ff6b6b;
  --red-dim: rgba(255,107,107,0.12);
  --amber: #ffc26a;
  --nav-h: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  overscroll-behavior: none;
}

/* ── Layout ── */
.screen {
  display: none;
  flex-direction: column;
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom));
}
.screen.active { display: flex; }

.topbar {
  padding: calc(var(--safe-top) + 16px) 20px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 0.5px solid var(--border);
}

.topbar-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.topbar-sub {
  font-size: 12px;
  color: var(--text3);
  margin-left: auto;
}

.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  -webkit-overflow-scrolling: touch;
}

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex;
  align-items: flex-start;
  padding-top: 10px;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--text3);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  cursor: pointer;
  padding: 6px 0;
  transition: color 0.2s;
}
.nav-btn.active { color: var(--accent); }
.nav-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-icon svg { width: 22px; height: 22px; stroke-width: 1.8; }

/* ── Inputs & Buttons ── */
.search-wrap {
  position: relative;
  margin-bottom: 16px;
}
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 14px;
  padding: 14px 50px 14px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input::placeholder { color: var(--text3); }
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-go {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--accent);
  border: none;
  border-radius: 10px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.search-go:active { transform: translateY(-50%) scale(0.94); opacity: 0.85; }
.search-go svg { width: 18px; height: 18px; stroke: white; stroke-width: 2.2; }

.btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  border-radius: 12px;
  padding: 12px 20px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  border: none;
}
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border2); }
.btn-full { width: 100%; display: block; text-align: center; }
.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn-row .btn { flex: 1; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 12px;
}

.result-word {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 6px;
}
.result-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.pos-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 20px;
  letter-spacing: 0.04em;
}
.speak-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s;
  margin-left: auto;
}
.speak-btn:active { background: var(--border2); }
.speak-btn svg { width: 16px; height: 16px; stroke: var(--text2); stroke-width: 2; }

.field-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.definition-text {
  font-size: 18px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 16px;
}
.example-block {
  background: var(--surface2);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 16px;
}
.example-en {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  font-style: italic;
  margin-bottom: 6px;
}
.example-ja {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}
.memo-field {
  width: 100%;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  resize: none;
  outline: none;
  min-height: 72px;
  transition: border-color 0.2s;
}
.memo-field::placeholder { color: var(--text3); }
.memo-field:focus { border-color: var(--accent); }

.add-success {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--green);
  justify-content: center;
  margin-top: 10px;
  min-height: 20px;
}

/* ── Word list ── */
.word-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.word-item:active { background: var(--surface2); border-color: var(--border2); }
.word-item-main { flex: 1; overflow: hidden; }
.word-item-en {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 3px;
}
.word-item-ja { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.word-item-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: none;
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text3);
  transition: color 0.15s, background 0.15s;
}
.icon-btn:active { background: var(--surface2); color: var(--text); }
.icon-btn svg { width: 16px; height: 16px; stroke-width: 2; }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text3);
  text-align: center;
  gap: 12px;
}
.empty-icon { font-size: 48px; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text2); }
.empty-sub { font-size: 14px; line-height: 1.6; }

/* ── Stats ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 16px;
}
.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 4px;
}
.stat-label { font-size: 12px; color: var(--text3); }

/* ── Quiz ── */
.quiz-progress {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}
.quiz-progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.quiz-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 24px 20px;
  margin-bottom: 16px;
}
.quiz-counter { font-size: 12px; color: var(--text3); margin-bottom: 16px; }
.quiz-sentence {
  font-size: 20px;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 10px;
  font-weight: 400;
}
.quiz-blank {
  display: inline-block;
  min-width: 80px;
  padding: 2px 10px;
  background: var(--accent-dim);
  border-radius: 6px;
  border-bottom: 2px solid var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.quiz-hint {
  font-size: 13px;
  color: var(--text2);
  background: var(--surface2);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 18px;
  line-height: 1.5;
}

.answer-input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  border-radius: 14px;
  padding: 14px 18px;
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  color: var(--text);
  outline: none;
  text-align: center;
  letter-spacing: 0.02em;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 14px;
}
.answer-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.answer-input.correct { border-color: var(--green); box-shadow: 0 0 0 3px rgba(61,214,140,0.2); }
.answer-input.wrong { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,107,107,0.2); }

.feedback {
  text-align: center;
  font-size: 15px;
  font-weight: 500;
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 14px;
  min-height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.25s;
}
.feedback.correct { background: var(--green-dim); color: var(--green); }
.feedback.wrong { background: var(--red-dim); color: var(--red); }

.result-screen {
  text-align: center;
  padding: 20px 0;
}
.result-emoji { font-size: 64px; margin-bottom: 16px; }
.result-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.result-sub { font-size: 15px; color: var(--text2); margin-bottom: 28px; }
.result-score {
  font-family: 'Syne', sans-serif;
  font-size: 56px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.03em;
  margin-bottom: 6px;
}
.result-denom { font-size: 16px; color: var(--text3); margin-bottom: 28px; }

/* ── Loading spinner ── */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 40px 20px;
  color: var(--text2);
  font-size: 14px;
}

/* ── Detail drawer ── */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  backdrop-filter: blur(4px);
  align-items: flex-end;
}
.drawer-overlay.open { display: flex; }
.drawer {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(var(--safe-bottom) + 20px);
  width: 100%;
  max-height: 80dvh;
  overflow-y: auto;
  border-top: 0.5px solid var(--border2);
  animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
}
@keyframes slideUp { from { transform: translateY(100%); } }
.drawer-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 0 auto 20px;
}
</style>
</head>
<body>

<!-- ══ SEARCH SCREEN ══ -->
<div class="screen active" id="screen-search">
  <div class="topbar">
    <span class="topbar-logo">DramaVocab</span>
    <span class="topbar-sub" id="topbar-count"></span>
  </div>
  <div class="scroll-area">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="単語を入力..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button class="search-go" onclick="lookupWord()" aria-label="検索">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z" stroke="white" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="search-result"></div>
  </div>
</div>

<!-- ══ CARDS SCREEN ══ -->
<div class="screen" id="screen-cards">
  <div class="topbar">
    <span class="topbar-logo">単語帳</span>
    <span class="topbar-sub" id="cards-count-label"></span>
  </div>
  <div class="scroll-area" id="cards-list"></div>
</div>

<!-- ══ QUIZ SCREEN ══ -->
<div class="screen" id="screen-quiz">
  <div class="topbar">
    <span class="topbar-logo">練習</span>
  </div>
  <div class="scroll-area" id="quiz-area"></div>
</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-search" onclick="switchTab('search')">
    <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z" stroke-linecap="round"/></svg></div>
    検索
  </button>
  <button class="nav-btn" id="nav-cards" onclick="switchTab('cards')">
    <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20" stroke-linecap="round"/></svg></div>
    単語帳
  </button>
  <button class="nav-btn" id="nav-quiz" onclick="switchTab('quiz')">
    <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 12l2 2 4-4M12 3a9 9 0 100 18A9 9 0 0012 3z" stroke-linecap="round"/></svg></div>
    練習
  </button>
</nav>

<!-- ══ WORD DETAIL DRAWER ══ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer-content">
    <div class="drawer-handle"></div>
    <div id="drawer-body"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'drama-vocab-v2';
let cards = [];
let currentResult = null;
let quizCards = [], quizIndex = 0, quizScore = {c:0,t:0}, quizAnswered = false;

/* ── Storage ── */
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); } catch(e) {}
}
function loadLocal() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) cards = JSON.parse(d);
  } catch(e) { cards = []; }
}

/* ── Navigation ── */
function switchTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'cards') renderCards();
  if (name === 'quiz') initQuiz();
}

/* ── Search & Lookup ── */
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupWord();
});

async function lookupWord() {
  const word = document.getElementById('search-input').value.trim();
  if (!word) return;
  const el = document.getElementById('search-result');
  el.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>${word} を調べています...</span></div>`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are a concise English dictionary for Japanese learners. Respond ONLY with this exact JSON, no markdown or extra text:\n{"word":"...","pos":"noun|verb|adj|adv|phrase","definition_ja":"（日本語で25字以内の意味）","example":"A natural English example sentence.","example_ja":"（例文の日本語訳）"}',
        messages: [{ role: 'user', content: `Look up: "${word}"` }]
      })
    });
    const data = await res.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    currentResult = JSON.parse(text.replace(/```json|```/g,'').trim());
    renderResult(currentResult);
  } catch(e) {
    el.innerHTML = `<div class="card" style="color:var(--red);text-align:center;padding:30px;">取得できませんでした。<br>もう一度お試しください。</div>`;
  }
}

function renderResult(r) {
  const already = cards.find(c => c.word.toLowerCase() === r.word.toLowerCase());
  document.getElementById('search-result').innerHTML = `
    <div class="card">
      <div class="result-word">${r.word}</div>
      <div class="result-meta">
        <span class="pos-badge">${r.pos}</span>
        <button class="speak-btn" onclick="speak('${esc(r.word)}')" aria-label="発音">
          <svg viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="field-label">意味</div>
      <div class="definition-text">${r.definition_ja}</div>
      <div class="field-label">例文</div>
      <div class="example-block">
        <div class="example-en">${r.example}</div>
        <div class="example-ja">${r.example_ja}</div>
      </div>
      <div class="field-label">メモ（任意）</div>
      <textarea class="memo-field" id="memo-input" placeholder="例：Friends S2E3 で聞いた"></textarea>
      <div class="btn-row">
        <button class="btn btn-primary btn-full" onclick="addCard()" id="add-btn">${already ? '✓ 追加済み' : '+ 単語帳に追加'}</button>
      </div>
      <div class="add-success" id="add-msg"></div>
    </div>`;
  if (already) document.getElementById('add-btn').style.opacity = '0.5';
}

function esc(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

async function addCard() {
  if (!currentResult) return;
  if (cards.find(c => c.word.toLowerCase() === currentResult.word.toLowerCase())) return;
  const memo = document.getElementById('memo-input').value;
  cards.push({ ...currentResult, memo, added: Date.now() });
  saveLocal();
  document.getElementById('add-btn').textContent = '✓ 追加済み';
  document.getElementById('add-btn').style.opacity = '0.5';
  document.getElementById('add-msg').innerHTML = '<span style="font-size:16px">✓</span> 単語帳に追加しました';
  updateTopbarCount();
}

function updateTopbarCount() {
  const el = document.getElementById('topbar-count');
  if (el) el.textContent = cards.length ? `${cards.length}語` : '';
}

/* ── Cards Screen ── */
function renderCards() {
  const el = document.getElementById('cards-list');
  document.getElementById('cards-count-label').textContent = cards.length ? `${cards.length}語` : '';
  if (!cards.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📚</div>
      <div class="empty-title">まだ単語がありません</div>
      <div class="empty-sub">検索タブで単語を調べて<br>単語帳に追加しましょう</div>
    </div>`;
    return;
  }
  el.innerHTML = cards.map((c, i) => `
    <div class="word-item" onclick="openDrawer(${i})">
      <div class="word-item-main">
        <div class="word-item-en">${c.word}</div>
        <div class="word-item-ja">${c.definition_ja}</div>
      </div>
      <div class="word-item-actions">
        <button class="icon-btn" onclick="event.stopPropagation();speak('${esc(c.word)}')" aria-label="発音">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" onclick="event.stopPropagation();deleteCard(${i})" aria-label="削除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function deleteCard(i) {
  if (!confirm(`「${cards[i].word}」を削除しますか？`)) return;
  cards.splice(i, 1);
  saveLocal();
  renderCards();
  updateTopbarCount();
}

function openDrawer(i) {
  const c = cards[i];
  document.getElementById('drawer-body').innerHTML = `
    <div class="result-word">${c.word}</div>
    <div class="result-meta">
      <span class="pos-badge">${c.pos}</span>
      <button class="speak-btn" onclick="speak('${esc(c.word)}')" aria-label="発音">
        <svg viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="field-label">意味</div>
    <div class="definition-text">${c.definition_ja}</div>
    <div class="field-label">例文</div>
    <div class="example-block">
      <div class="example-en">${c.example}</div>
      <div class="example-ja">${c.example_ja}</div>
    </div>
    ${c.memo ? `<div class="field-label">メモ</div><div style="font-size:14px;color:var(--text2);line-height:1.6;">${c.memo}</div>` : ''}`;
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeDrawer(e) {
  if (e.target === document.getElementById('drawer-overlay'))
    document.getElementById('drawer-overlay').classList.remove('open');
}

/* ── Quiz ── */
function initQuiz() {
  const eligible = cards.filter(c => c.example && c.word);
  if (eligible.length < 2) { renderQuizEmpty(); return; }
  quizCards = [...eligible].sort(() => Math.random() - 0.5);
  quizIndex = 0;
  quizScore = { c: 0, t: 0 };
  quizAnswered = false;
  renderQuizQuestion();
}

function renderQuizEmpty() {
  document.getElementById('quiz-area').innerHTML = `<div class="empty-state">
    <div class="empty-icon">✏️</div>
    <div class="empty-title">単語が足りません</div>
    <div class="empty-sub">2語以上追加すると<br>練習できます</div>
  </div>`;
}

function renderQuizQuestion() {
  if (quizIndex >= quizCards.length) { renderQuizResult(); return; }
  quizAnswered = false;
  const c = quizCards[quizIndex];
  const pct = Math.round(quizIndex / quizCards.length * 100);
  const sentence = c.example.replace(new RegExp('\\b' + c.word + '\\b', 'gi'), '______');
  document.getElementById('quiz-area').innerHTML = `
    <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${pct}%"></div></div>
    <div class="quiz-card">
      <div class="quiz-counter">${quizIndex + 1} / ${quizCards.length}</div>
      <div class="quiz-sentence">${sentence.replace('______','<span class="quiz-blank">______</span>')}</div>
      <div class="quiz-hint">${c.example_ja}</div>
      <input class="answer-input" id="quiz-ans" type="text" placeholder="答えを入力..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <div id="feedback" class="feedback"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="speakQuiz()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="vertical-align:-2px;margin-right:4px"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14" stroke-linecap="round"/></svg>
          発音
        </button>
        <button class="btn btn-primary" onclick="checkAnswer()">確認</button>
      </div>
    </div>`;
  const inp = document.getElementById('quiz-ans');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
  setTimeout(() => inp.focus(), 100);
}

function checkAnswer() {
  if (quizAnswered) return;
  const inp = document.getElementById('quiz-ans');
  const ans = inp.value.trim();
  if (!ans) return;
  const correct = quizCards[quizIndex].word;
  quizAnswered = true;
  quizScore.t++;
  const fb = document.getElementById('feedback');
  if (ans.toLowerCase() === correct.toLowerCase()) {
    quizScore.c++;
    inp.classList.add('correct');
    fb.className = 'feedback correct';
    fb.innerHTML = '✓ 正解！';
  } else {
    inp.classList.add('wrong');
    fb.className = 'feedback wrong';
    fb.innerHTML = `✗ 正解は <strong>${correct}</strong>`;
  }
  document.querySelector('.btn-row').innerHTML = `
    <button class="btn btn-ghost" onclick="speakQuiz()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="vertical-align:-2px;margin-right:4px"><path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14" stroke-linecap="round"/></svg>
      発音
    </button>
    <button class="btn btn-primary" onclick="nextQuestion()">次へ →</button>`;
}

function nextQuestion() { quizIndex++; renderQuizQuestion(); }

function speakQuiz() {
  if (quizCards[quizIndex]) speak(quizCards[quizIndex].example);
}

function renderQuizResult() {
  const pct = Math.round(quizScore.c / quizScore.t * 100);
  const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪';
  const msg = pct >= 80 ? 'すばらしい！' : pct >= 50 ? 'よくできました！' : 'もう少し練習しよう！';
  document.getElementById('quiz-area').innerHTML = `
    <div class="quiz-progress"><div class="quiz-progress-bar" style="width:100%"></div></div>
    <div class="card result-screen">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${msg}</div>
      <div class="result-score">${pct}<span style="font-size:28px;color:var(--text3)">%</span></div>
      <div class="result-denom">${quizScore.c} / ${quizScore.t} 問正解</div>
      <button class="btn btn-primary btn-full" onclick="initQuiz()">もう一度</button>
      <button class="btn btn-ghost btn-full" style="margin-top:10px" onclick="switchTab('search')">単語を追加する</button>
    </div>`;
}

/* ── Init ── */
loadLocal();
updateTopbarCount();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
